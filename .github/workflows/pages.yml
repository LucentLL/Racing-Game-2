# Deploys the Vite production build to GitHub Pages on every push to
# main. Result: https://lucentll.github.io/Racing-Game-2/ — refreshes
# within ~1-2 min of a push landing.
#
# Setup (one time): repo Settings → Pages → Build and deployment →
# Source: "GitHub Actions". After that, every push triggers this
# workflow; no further manual steps.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Allow manual triggering from the Actions tab for re-deploys
  # without needing a push.
  workflow_dispatch:

# Permissions the Pages deploy action requires.
permissions:
  contents: read
  pages: write
  id-token: write

# Cancel in-flight runs if a new push lands — only the latest commit
# needs to be deployed. Doesn't cancel an actual Pages deployment
# already in progress (the cancel-in-progress group is the workflow,
# not the Pages env).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # Bring the repo + LFS POINTER files only. Deliberately NOT `lfs: true`
        # — that downloads EVERY LFS object on EVERY run, burning the free
        # 1GB/mo LFS bandwidth quota. The objects are restored from the Actions
        # cache below instead, so a code-only push costs ZERO LFS bandwidth.
        uses: actions/checkout@v4

      - name: Build LFS asset list (cache key)
        # The OID of every LFS-tracked file (public/cars/*.png,
        # public/audio/*.wav, *.mp3). hashFiles() of this list changes ONLY
        # when an asset's CONTENT changes — so unchanged assets reuse the cache.
        run: git lfs ls-files --long | cut -d ' ' -f1 | sort > .lfs-assets-id

      - name: Restore LFS object cache
        id: lfs-cache
        uses: actions/cache@v4
        with:
          path: .git/lfs
          key: ${{ runner.os }}-lfs-${{ hashFiles('.lfs-assets-id') }}
          # Partial fallback: reuse the previous cache even when one asset
          # changed, so `git lfs pull` only fetches the new/changed file.
          restore-keys: ${{ runner.os }}-lfs-

      - name: Pull LFS objects (only what the cache is missing)
        # No-op on a full cache hit (objects already in .git/lfs → no download);
        # on a miss it fetches just what's absent, then actions/cache saves
        # .git/lfs for next time. Either way this smudges the working-tree
        # pointers into the real PNG/WAV/MP3 that Vite then bundles into dist/.
        run: git lfs pull

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (production)
        # vite.config.ts reads mode=production here and emits assets
        # under base '/Racing-Game-2/'. tsc --noEmit runs first to fail
        # the build on type errors before bothering to bundle.
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
