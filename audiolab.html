<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>DRIVER CITY — AUDIO LAB</title>
  <style>
    /* H1224 ear-test lab — dev tool, GT2 amber on dark. Unlinked from the
       game shell; navigate to /audiolab.html directly. */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #14100a; color: #e8b558; font-family: 'Segoe UI', system-ui, sans-serif; }
    #lab { max-width: 560px; margin: 0 auto; padding: 14px 14px 40px; }
    h1 { font-size: 16px; letter-spacing: 3px; border-bottom: 2px solid #6b4d1e; padding-bottom: 8px; margin-bottom: 4px; }
    h1 small { color: #8a6a30; font-size: 10px; letter-spacing: 1px; float: right; margin-top: 4px; }
    .row { margin-top: 14px; }
    label { display: block; font-size: 11px; letter-spacing: 2px; color: #b3873c; margin-bottom: 4px; }
    select { width: 100%; background: #241b0e; color: #e8b558; border: 1px solid #6b4d1e; padding: 10px 8px; font-size: 14px; border-radius: 3px; }
    input[type=range] { width: 100%; height: 34px; accent-color: #e8a33d; }
    .val { float: right; color: #f4d38a; font-variant-numeric: tabular-nums; }
    .btnrow { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
    button { background: #241b0e; color: #e8b558; border: 1px solid #6b4d1e; padding: 12px 14px; font-size: 13px; letter-spacing: 1px; border-radius: 3px; cursor: pointer; flex: 1; min-width: 72px; }
    button.on { background: #e8a33d; color: #14100a; font-weight: 600; }
    button:active { background: #3a2c14; }
    button.on:active { background: #c88a2e; }
    #readout { margin-top: 16px; border: 1px solid #4a3615; background: #1b1508; padding: 10px 12px; font-size: 12px; line-height: 1.8; border-radius: 3px; }
    #readout b { color: #f4d38a; font-weight: 600; }
    #start { position: fixed; inset: 0; background: #14100a; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 14px; z-index: 10; }
    #start button { flex: none; font-size: 18px; padding: 18px 44px; }
    #start p { color: #8a6a30; font-size: 12px; max-width: 300px; text-align: center; }
  </style>
</head>
<body>
  <div id="start">
    <button id="startBtn">START AUDIO</button>
    <p>Engine voice test bench — pick any car, sweep the RPM, toggle build stages. Browser audio needs one tap to unlock.</p>
  </div>
  <div id="lab">
    <h1>AUDIO LAB <small id="buildId"></small></h1>
    <div class="row"><label>ENGINE FAMILY</label><select id="family"></select></div>
    <div class="row"><label>CAR</label><select id="car"></select></div>
    <div class="row"><label>RPM <span class="val" id="rpmVal"></span></label>
      <input type="range" id="rpm" min="800" max="8000" step="10" /></div>
    <div class="row"><label>THROTTLE <span class="val" id="thrVal"></span></label>
      <input type="range" id="thr" min="0" max="100" step="1" value="0" /></div>
    <div class="row"><label>POWER STAGE</label>
      <div class="btnrow" id="stages"></div></div>
    <div class="btnrow">
      <button id="scBtn">SC MOD</button>
      <button id="shiftBtn">SHIFT</button>
      <button id="sweepBtn">SWEEP</button>
    </div>
    <div id="readout"></div>
  </div>
  <script type="module" src="/src/audiolab/main.ts"></script>
</body>
</html>
